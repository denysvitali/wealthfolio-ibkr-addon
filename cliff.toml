[context]
# Current changelog header
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
# Template for the changelog body
body = """
{% if version %}\
## [{{ version }}]] - {{ timestamp | date(format="%Y-%m-%d") }}\
{% else %}\
## [Unreleased]\
{% endif %}\n
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | upper_first }}\
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | trim }} ({{ commit.id | truncate(length=7, end="") }})\
{% endfor %}\
{% endfor %}\n
"""
# Template for the footer
footer = """
<!-- generated by git-cliff -->
"""
# Remove the leading empty lines from the body
trim = true

[issues]
# Link to issues
link_issues = true

[package]
# The current version. This is the fallback for untagged commits.
# This will be overwritten by git-cliff
version = "1.0.0"

[changelog]
# Enables parsing commit messages as conventional commits
conventional_commits = true

[git]
# Parse the commit messages based on conventional commits
parse_commits = true
# Generate commits since last tag
since = ""
# Tag to use for the previous release (for unreleased section)
# This should match your tag format
tag_pattern = "v[0-9].*"
# Regex to populate extra variables in templates
# Example: Extract "type" from "feat(scope): message"
照合 = ".*"
