name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Create ZIP package
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          mkdir -p release
          zip -r "release/wealthfolio-ibkr-addon-${SHORT_SHA}.zip" manifest.json dist/ README.md LICENSE

      - name: Create GitHub Release (pre-release)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          gh release create "ci-build-${SHORT_SHA}" \
            --target "${GITHUB_SHA}" \
            --title "CI Build ${SHORT_SHA}" \
            --notes "Automated pre-release from push to main at commit ${SHORT_SHA}." \
            --prerelease \
            release/*.zip