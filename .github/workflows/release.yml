name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install git-cliff
        uses: home-assistant/actions/github/cli@main
        with:
          command: |
            curl -L https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
            sudo mv git-cliff /usr/local/bin/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Generate release notes
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Generate changelog directly for the release
          git-cliff --tag $VERSION > release_notes.md

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release notes:"
          cat release_notes.md

      - name: Build addon
        run: pnpm build

      - name: Create ZIP package
        run: |
          mkdir -p release
          zip -r "release/wealthfolio-ibkr-addon-${VERSION}.zip" manifest.json dist/ README.md LICENSE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.changelog.outputs.version }}
